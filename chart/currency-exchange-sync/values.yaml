cronjob:
  name: currency-exchange-rates-sync
  schedule: "0 0,8,16 * * *"
  id: currency-exchange-rates-sync
  timeZone: "Asia/Kolkata"
  exchangeRatesApiLatestRatesUrl: http://api.exchangeratesapi.io/v1/latest
  retentionPeriodDays: 1825
  env: Homelab
  logLevel: INFO
  version: "2.3-prod"

  metadata:
    namespace: currency-exchange-rates-sync

  # Secret containing DB password (replicated from postgresql namespace)
  dbCredentialsSecret: currencyexchangeratessync-db-credentials

  # Secret containing app credentials (API key, Rollbar, Sentry)
  appSecretsName: currency-exchange-rates-sync-secrets

  # Database connection (non-secret values; user, database, and password come from dbCredentialsSecret)
  db:
    host: pg-cluster-rw.postgresql.svc.cluster.local
    port: "5432"
    sslMode: prefer

  restartPolicy: Never
  backoffLimit: 1
  successfulJobsHistoryLimit: 8
  failedJobsHistoryLimit: 8

  image:
    repository: macstation-ubuntu-1.local:30500/currency-exchange-sync
    pullPolicy: IfNotPresent
    imagePullSecrets: ""
    restartPolicy: Never
    concurrencyPolicy: Forbid

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 128Mi
